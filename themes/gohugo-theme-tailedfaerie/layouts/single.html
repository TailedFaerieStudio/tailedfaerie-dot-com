{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<article>
    <header>
        <h1>{{ .Title }}</h1>
        <time datetime="{{ .Date.Format "2023-10-15T13:18:50Z" }}">
            {{ .Date.Format "January 2, 2006" }}
        </time>
    </header>
    <hr>
    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
